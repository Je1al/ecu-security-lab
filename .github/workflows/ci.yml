name: CI

on:
  push:
  pull_request:

jobs:
  build-ecu:
    name: Build ECU + C tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure & build
        run: |
          cmake -S . -B build
          cmake --build build
      - name: Run C tests (ctest)
        run: ctest --test-dir build --output-on-failure

  toolkit:
    name: Toolkit unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install toolkit
        run: pip install -e ./toolkit
      - name: Run pure tests
        run: python -m unittest discover -s tests -v

  e2e:
    name: E2E attacks over vcan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build the ECU target
        run: |
          cmake -S . -B build
          cmake --build build --target ecu
      - name: Enable the vcan kernel module
        run: |
          sudo apt-get update
          sudo apt-get install -y "linux-modules-extra-$(uname -r)"
      - name: Bring up virtual CAN
        run: sudo bash docker/setup-vcan.sh vcan0
      - name: Install toolkit
        run: pip install -e ./toolkit
      - name: Run attacks against the target
        env:
          ECU_E2E: "1"
          ECU_BIN: ${{ github.workspace }}/build/ecu/ecu
          ECU_IFACE: vcan0
        run: python -m unittest discover -s tests -v
